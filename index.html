<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>采购文件上传 — 百炼知识库</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <h1>📄 采购文件上传</h1>
            <p class="subtitle">拖入文件，自动重命名为 AUNV v1 标准格式并上传到百炼知识库</p>
        </header>

        <!-- Step 1: File Type Selection -->
        <section id="step-type" class="card">
            <h2>第 1 步：选择文件类型</h2>
            <p class="hint">本次上传的所有文件将统一使用此类型</p>
            <div class="type-buttons">
                <button class="type-btn" data-type="Quotation">报价单 (Quotation)</button>
                <button class="type-btn" data-type="TechSpec">技术规格书 (TechSpec)</button>
                <button class="type-btn" data-type="PriceComparison">比价表 (PriceComparison)</button>
                <button class="type-btn" data-type="FC">框架合同 (FC)</button>
                <button class="type-btn" data-type="PO">采购订单 (PO)</button>
            </div>
        </section>

        <!-- Step 2: Drop Zone -->
        <section id="step-upload" class="card hidden">
            <h2>第 2 步：拖入文件 / 点击选择</h2>
            <div id="drop-zone" class="drop-zone">
                <div class="drop-zone-content">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p class="drop-text">拖入文件 或 <span class="browse-link">点击选择</span></p>
                    <p class="drop-hint">支持 .pdf / .docx / .doc / .xlsx / .xls，单文件 ≤ 10MB，最多 20 个</p>
                </div>
                <input type="file" id="file-input" multiple accept=".pdf,.docx,.doc,.xlsx,.xls" hidden>
            </div>
        </section>

        <!-- Step 3: Rename Preview -->
        <section id="step-preview" class="card hidden">
            <h2>第 3 步：确认重命名预览</h2>
            <table id="preview-table">
                <thead>
                    <tr>
                        <th>原始文件名</th>
                        <th>项目编号</th>
                        <th>AUNV v1 标准名</th>
                        <th>状态</th>
                    </tr>
                </thead>
                <tbody id="preview-tbody"></tbody>
            </table>
            <div class="action-buttons">
                <button id="confirm-upload" class="btn-primary">✅ 确认上传</button>
                <button id="cancel-upload" class="btn-secondary">❌ 取消</button>
            </div>
        </section>

        <!-- Step 4: Upload Progress -->
        <section id="step-progress" class="card hidden">
            <h2>上传进度</h2>
            <div id="upload-results"></div>
        </section>

        <!-- API Config (collapsible) -->
        <details class="card api-config">
            <summary>⚙️ API 配置</summary>
            <div class="config-row">
                <label for="api-url-input">后端 API 地址：</label>
                <input type="text" id="api-url-input" placeholder="https://web-upload-backend-xxx.fcapp.run">
                <button id="save-api-url" class="btn-small">保存</button>
            </div>
            <p class="hint">开发环境默认 <code>http://localhost:9000</code></p>
        </details>

        <!-- Toast notifications -->
        <div id="toast-container"></div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/rename.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
